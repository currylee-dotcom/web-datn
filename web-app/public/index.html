<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Giám sát gia súc</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQpKN6NV6Ffm1Q4JiE6kv7yU0WmznTI="
      crossorigin=""
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="shell">
      <section id="entryView" class="entry-view">
        <div class="entry-panel">
          <div class="brand-row">
            <div class="brand-mark">GS</div>
            <div>
              <p class="eyebrow">Theo dõi trang trại</p>
              <h1>Giám sát gia súc</h1>
            </div>
          </div>

          <div class="entry-tabs" role="tablist" aria-label="Chọn chế độ">
            <button id="registerModeBtn" class="tab active" type="button">Đăng ký thiết bị</button>
            <button id="loginModeBtn" class="tab" type="button">Đăng nhập theo dõi</button>
          </div>

          <form id="registerForm" class="entry-form" novalidate>
            <label for="registerFarmCode">Mã trang trại</label>
            <div class="code-row">
              <input
                id="registerFarmCode"
                name="farmCode"
                inputmode="numeric"
                maxlength="6"
                pattern="[0-9]{6}"
                placeholder="888888"
                autocomplete="one-time-code"
                required
              />
              <button id="generateCodeBtn" class="ghost" type="button">Tạo mã</button>
            </div>

            <label for="collarId">Mã ID vòng cổ</label>
            <input
              id="collarId"
              name="collarId"
              placeholder="B0:A1:C2:D3:E4:F5"
              autocomplete="off"
              required
            />
            <p id="collarIdError" class="field-error" aria-live="polite" hidden></p>

            <button type="submit">Lưu</button>
            <p id="registerMessage" class="status-line" aria-live="polite"></p>
          </form>

          <form id="loginForm" class="entry-form" hidden>
            <label for="loginCode">Mã trang trại</label>
            <input
              id="loginCode"
              name="loginCode"
              inputmode="numeric"
              maxlength="6"
              pattern="[0-9]{6}"
              placeholder="888888"
              autocomplete="one-time-code"
              required
            />
            <button type="submit">Đăng nhập</button>
            <p id="loginError" class="error" hidden></p>
          </form>
        </div>
      </section>

      <section id="appView" class="app-view" hidden>
        <header class="topbar">
          <div>
            <p class="eyebrow">Mã trang trại <span id="farmCodeLabel">------</span></p>
            <h1 id="farmName">Giám sát gia súc</h1>
          </div>
          <div class="top-actions">
            <button id="refreshBtn" type="button">Làm mới</button>
            <button id="logoutBtn" type="button" class="ghost">Thoát</button>
          </div>
        </header>

        <section class="content-grid">
          <aside class="sidebar">
            <div class="tabs" role="tablist" aria-label="Chọn bản đồ">
              <button id="realtimeTab" class="tab active" type="button">Bản đồ</button>
              <button id="historyTab" class="tab" type="button">Lịch sử</button>
              <button id="geofenceTab" class="tab" type="button">Hàng rào</button>
            </div>

            <section class="panel">
              <h2>Thiết bị</h2>
              <select id="deviceSelect" aria-label="Chọn vòng cổ"></select>
              <dl class="metrics">
                <div>
                  <dt>Khoảng cách</dt>
                  <dd id="distanceValue">--</dd>
                </div>
                <div>
                  <dt>Pin</dt>
                  <dd id="batteryValue">--</dd>
                </div>
                <div>
                  <dt>RSSI</dt>
                  <dd id="rssiValue">--</dd>
                </div>
                <div>
                  <dt>Cập nhật</dt>
                  <dd id="updatedValue">--</dd>
                </div>
              </dl>
            </section>

            <section class="panel">
              <h2>Hàng rào ảo</h2>
              <label for="radiusInput">Bán kính an toàn (m)</label>
              <input id="radiusInput" type="range" min="20" max="5000" step="10" />
              <div class="radius-row">
                <input id="radiusNumber" type="number" min="20" max="10000" step="10" />
                <button id="saveFenceBtn" type="button">Lưu bán kính</button>
              </div>
            </section>

            <section class="panel alerts-panel">
              <h2>Cảnh báo</h2>
              <div id="alertsList" class="alerts-list"></div>
            </section>
          </aside>

          <section class="map-wrap">
            <div id="map"></div>
          </section>
        </section>
      </section>
    </main>

    <div id="successModal" class="modal" hidden>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="successTitle">
        <h2 id="successTitle">Đã lưu vòng cổ</h2>
        <p id="successText"></p>
        <div class="modal-actions">
          <button id="finishRegisterBtn" type="button">Hoàn thành</button>
          <button id="addMoreBtn" class="ghost" type="button">Nhập thêm bò</button>
        </div>
      </div>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="/app.js"></script>
  </body>
</html>
